services:

  db-juanfe-logis:
    image: postgres:15-alpine
    container_name: db-juanfe-logis
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logis
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 20s
      timeout: 10s
      retries: 5
  api-juanfe-logis:
    build: .
    container_name: api-juanfe-logis
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    networks:
      - logis
    ports:
      - "8080:8080"
    depends_on:
      db-juanfe-logis:
        condition: service_healthy

networks:
  logis:
    driver: bridge

volumes:
  postgres_data:
